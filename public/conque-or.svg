    />

    <!-- Base arrière -->
    <path d="M78 188 C83 176 95 168 110 168 C125 168 137 176 142 188 L78 188 Z" fill="url(#baseGold)" opacity="0.95"/>

    <!-- Pied blanc central -->
    <ellipse cx="110" cy="186" rx="22" ry="14" fill="url(#footLight)"/>

    <!-- Nervures -->
    <path d="M110 30 L110 184" stroke="url(#ribLine)" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M101 32 C101 70 100 120 98 184" stroke="url(#ribLine)" stroke-width="3.2" stroke-linecap="round"/>
    <path d="M119 32 C119 70 120 120 122 184" stroke="url(#ribLine)" stroke-width="3.2" stroke-linecap="round"/>

    <path d="M92 36 C90 72 88 122 86 182" stroke="url(#ribLine)" stroke-width="3" stroke-linecap="round"/>
    <path d="M128 36 C130 72 132 122 134 182" stroke="url(#ribLine)" stroke-width="3" stroke-linecap="round"/>

    <path d="M82 42 C78 76 74 122 72 176" stroke="url(#ribLine)" stroke-width="2.8" stroke-linecap="round"/>
    <path d="M138 42 C142 76 146 122 148 176" stroke="url(#ribLine)" stroke-width="2.8" stroke-linecap="round"/>

    <path d="M71 50 C64 82 58 122 56 168" stroke="url(#ribLine)" stroke-width="2.6" stroke-linecap="round"/>
    <path d="M149 50 C156 82 162 122 164 168" stroke="url(#ribLine)" stroke-width="2.6" stroke-linecap="round"/>

    <path d="M61 61 C52 92 48 124 47 156" stroke="url(#ribLine)" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M159 61 C168 92 172 124 173 156" stroke="url(#ribLine)" stroke-width="2.4" stroke-linecap="round"/>

    <path d="M53 74 C45 101 42 124 43 145" stroke="url(#ribLine)" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M167 74 C175 101 178 124 177 145" stroke="url(#ribLine)" stroke-width="2.2" stroke-linecap="round"/>
  </g>
</svg>