<svg width="220" height="220" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shellMain" x1="110" y1="20" x2="110" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F4DFC2"/>
      <stop offset="48%" stop-color="#EBCB9D"/>
      <stop offset="100%" stop-color="#D9B07B"/>
    </linearGradient>

    <radialGradient id="shellLight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(110 112) rotate(90) scale(82 95)">
      <stop offset="0%" stop-color="#FFF9F0" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#F7E6CC" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#E1BE8C" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="ribLine" x1="110" y1="28" x2="110" y2="182" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C98F54" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#B8793F" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#9F6A35" stop-opacity="0.18"/>
    </linearGradient>

    <linearGradient id="baseGold" x1="110" y1="160" x2="110" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E3C190"/>
      <stop offset="100%" stop-color="#C89459"/>
    </linearGradient>

    <radialGradient id="footLight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(110 184) rotate(90) scale(18 30)">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F4F0EB"/>
    </radialGradient>

    <filter id="shadow" x="20" y="18" width="180" height="190" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#8F6C46" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Ombre sol -->
    <ellipse cx="110" cy="196" rx="44" ry="10" fill="#B8A18A" opacity="0.18"/>

    <!-- Coquille principale -->
    <path
      d="M110 26
         C100 28 88 33 77 42
         C65 52 55 66 48 82
         C42 97 40 114 41 128
         C42 142 46 154 52 165
         C60 179 74 188 92 191
         L128 191
         C146 188 160 179 168 165
         C174 154 178 142 179 128
         C180 114 178 97 172 82
         C165 66 155 52 143 42
         C132 33 120 28 110 26 Z"
      fill="url(#shellMain)"
    />

    <!-- Lumière douce -->
    <path
      d="M110 26
         C100 28 88 33 77 42
         C65 52 55 66 48 82
         C42 97 40 114 41 128
         C42 142 46 154 52 165
         C60 179 74 188 92 191
         L128 191
         C146 188 160 179 168 165
         C174 154 178 142 179 128
         C180 114 178 97 172 82
         C165 66 155 52 143 42
         C132 33 120 28 110 26 Z"
